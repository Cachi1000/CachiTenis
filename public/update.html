<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar CachiTenis</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background: #0f172a; 
            color: white;
            line-height: 1.5;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 { color: #2ca0d9; margin-bottom: 20px; }
        p { margin-bottom: 30px; color: #94a3b8; }
        button { 
            background: #D2F331; 
            color: #0f172a; 
            border: none; 
            padding: 20px; 
            width: 100%;
            font-size: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(210, 243, 49, 0.3);
        }
        button:active { transform: scale(0.98); background: #bada24; }
        #status { margin-top: 20px; font-weight: bold; color: #10b981; }
        .footer { margin-top: 30px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Centro de Actualizaci&oacute;n</h1>
        <p>Usa esta herramienta si CachiTenis no se actualiza o sigues viendo el ícono antiguo.</p>
        
        <button onclick="limpiarTodo()" id="btn-main">LIMPIAR Y ACTUALIZAR AHORA</button>
        
        <div id="status"></div>
        
        <div class="footer">
            Esta acci&oacute;n borrar&aacute; los archivos viejos guardados en tu navegador y descargar&aacute; la versi&oacute;n m&aacute;s reciente con la pelota de tenis.
        </div>
    </div>

    <script>
        async function limpiarTodo() {
            const btn = document.getElementById('btn-main');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.style.opacity = '0.5';
            status.innerText = "Limpiando sistema...";

            try {
                // 1. Unregister Service Workers
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for(let reg of regs) {
                        console.log('Desregistrando:', reg.scope);
                        await reg.unregister();
                    }
                }

                // 2. Delete Caches
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for(let key of keys) {
                        console.log('Borrando cache:', key);
                        await caches.delete(key);
                    }
                }

                status.innerText = "¡Limpieza completa!";
                
                // 3. Force reload with timestamp to bypass Edge caching
                setTimeout(() => {
                    window.location.href = "index.html?v_update=1&t=" + Date.now();
                }, 1000);

            } catch (err) {
                console.error(err);
                status.style.color = '#ef4444';
                status.innerText = "Error: " + err.message;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
